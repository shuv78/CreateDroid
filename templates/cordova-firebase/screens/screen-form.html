<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Add/Edit - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/db-firebase.js"></script></head><body onload="initForm()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2 id="formTitle">Add New</h2><span></span></nav><form id="entryForm" onsubmit="handleSubmit(event)"><div class="form-group"><label>Name <span class="required">*</span></label><input type="text" id="fieldName" required placeholder="Enter name"></div><div class="form-group"><label>Description</label><textarea id="fieldDesc" rows="3" placeholder="Description (optional)"></textarea></div><div class="form-group"><label>Status</label><select id="fieldStatus"><option value="active">Active</option><option value="inactive">Inactive</option><option value="pending">Pending</option></select></div><div class="form-group"><div class="image-upload" onclick="document.getElementById('fileInput').click()"><div id="imagePreview">+ Add Photo</div><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(event)"></div></div><div class="form-actions"><button type="submit" class="primary-btn" id="submitBtn">💾 Save</button><button type="button" class="secondary-btn" onclick="window.history.back()">Cancel</button></div></form><div id="formError" class="error-msg" style="display:none"></div></div><script>
let editId=null;
function initForm() { const params=new URLSearchParams(window.location.search); editId=params.get('id'); if(editId){document.getElementById('formTitle').textContent='Edit Item';document.getElementById('submitBtn').textContent='💾 Update';loadItem(editId);} }
async function loadItem(id) { try { const item=await getById('items',id); if(!item) return; document.getElementById('fieldName').value=item.name||''; document.getElementById('fieldDesc').value=item.description||''; document.getElementById('fieldStatus').value=item.status||'active'; if(item.imageUrl) document.getElementById('imagePreview').innerHTML='<img src="'+esc(item.imageUrl)+'" style="max-width:100%;max-height:200px">'; } catch(e){showError('Failed to load item');} }
function previewImage(e) { const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(ev){document.getElementById('imagePreview').innerHTML='<img src="'+ev.target.result+'" style="max-width:100%;max-height:200px">';}; reader.readAsDataURL(file); }
async function handleSubmit(e) { e.preventDefault(); document.getElementById('formError').style.display='none'; const data={name:document.getElementById('fieldName').value,description:document.getElementById('fieldDesc').value,status:document.getElementById('fieldStatus').value,updatedAt:new Date().toISOString()}; try { if(editId){ await updateDoc('items',editId,data); showSuccess('Updated!'); } else { data.createdAt=new Date().toISOString(); await addDoc('items',data); showSuccess('Saved!'); } setTimeout(()=>window.location.href='screen-list.html',1000); } catch(e){document.getElementById('formError').textContent='Error: '+e.message;document.getElementById('formError').style.display='block';} }
function showError(msg){document.getElementById('formError').textContent=msg;document.getElementById('formError').style.display='block';}
function showSuccess(msg){document.getElementById('formError').textContent=msg;document.getElementById('formError').style.color='green';document.getElementById('formError').style.display='block';}
</script></body></html>
