<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Login - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/auth.js"></script></head><body onload="initLogin()"><div id="loginContainer" class="login-page"><div class="login-header"><img src="assets/icons/icon-192.png" alt="Logo" class="login-logo"><h1>MyApp</h1><p class="app-desc">App Description Here</p></div><div class="login-tabs"><button class="tab-btn active" onclick="switchTab('id')">ID Login</button><button class="tab-btn" onclick="switchTab('phone')">Phone Login</button></div><form id="loginForm" onsubmit="handleLogin(event)"><div id="idLoginFields"><input type="text" id="userId" placeholder="User ID" required autocomplete="username"></div><div id="phoneLoginFields" style="display:none"><input type="tel" id="phone" placeholder="Phone Number" pattern="01[3-9][0-9]{8}" autocomplete="tel"></div><div class="password-field"><input type="password" id="password" placeholder="Password" required autocomplete="current-password"><button type="button" class="toggle-pw" onclick="togglePassword()">👁</button></div><button type="submit" class="login-btn">Login</button></form><div id="loginError" class="error-msg" style="display:none"></div><button class="fingerprint-btn" onclick="fingerprintLogin()" id="fpBtn" style="display:none">🔐 Fingerprint Login</button><div id="versionBadge" class="version-badge"></div></div><script>
function initLogin() { document.getElementById('versionBadge').textContent = 'v' + APP_VERSION; checkFingerprint(); }
function switchTab(tab) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='id'?'ID':'Phone'))); document.getElementById('idLoginFields').style.display=tab==='id'?'':'none'; document.getElementById('phoneLoginFields').style.display=tab==='phone'?'':'none'; }
function togglePassword() { const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'; }
function checkFingerprint() { if(typeof Fingerprint!=='undefined') document.getElementById('fpBtn').style.display='block'; }
function fingerprintLogin() { if(typeof Fingerprint!=='undefined') Fingerprint.show({description:'Login with fingerprint',disableBackup:true}).then(()=>{performLogin('fingerprint');}).catch(()=>{document.getElementById('loginError').textContent='Fingerprint failed. Use password.';document.getElementById('loginError').style.display='block';}); }
async function handleLogin(e) { e.preventDefault(); const pw=document.getElementById('password').value; const userId=document.getElementById('userId').value; const phone=document.getElementById('phone').value; document.getElementById('loginError').style.display='none'; try { const user=await loginUser(userId||phone,pw); if(user) { localStorage.setItem('currentUser',JSON.stringify(user)); window.location.href='screen-dashboard.html'; } } catch(err) { document.getElementById('loginError').textContent=err.message||'Login failed'; document.getElementById('loginError').style.display='block'; } }
</script></body></html>
