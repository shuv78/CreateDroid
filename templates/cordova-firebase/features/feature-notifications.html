<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Notifications - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"></head><body><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Notifications</h2><span></span></nav><div style="padding:16px;text-align:center"><button class="primary-btn" onclick="requestPermission()">🔔 Enable Notifications</button><div id="notifStatus" style="margin-top:16px;padding:12px;background:var(--surface);border-radius:8px"><p>Notification permission: <strong id="permissionStatus">not requested</strong></p><p>FCM Token: <span id="fcmToken" style="font-size:12px;word-break:break-all">-</span></p></div><div id="notifLog" style="margin-top:16px"></div></div></div><script>
function requestPermission(){if(typeof FCMPlugin!=='undefined'){FCMPlugin.requestPushPermission(function(){document.getElementById('permissionStatus').textContent='✅ Granted';FCMPlugin.getToken(function(t){document.getElementById('fcmToken').textContent=t;logNotif('FCM Token received');});},function(){document.getElementById('permissionStatus').textContent='❌ Denied';});FCMPlugin.onNotification(function(data){if(data.wasTapped){logNotif('🔔 Tapped (background): '+JSON.stringify(data));}else{logNotif('🔔 Received (foreground): '+JSON.stringify(data));}});}else{document.getElementById('permissionStatus').textContent='⚠️ FCM Plugin not loaded';logNotif('ℹ️ Add cordova-plugin-fcm-with-dependecy-updated');}}
function logNotif(msg){const c=document.getElementById('notifLog');const e=document.createElement('div');e.textContent='['+new Date().toLocaleTimeString()+'] '+msg;e.style.padding='4px 0';e.style.fontSize='12px';c.prepend(e);}
</script></body></html>
