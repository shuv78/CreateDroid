<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Maps - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script></head><body onload="initMaps()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Maps</h2><span></span></nav><div id="map" style="width:100%;height:60vh"></div><div class="map-controls" style="padding:12px"><button class="action-btn" onclick="getLocation()">📍 My Location</button><p id="locationDisplay">Click button to get location</p></div></div><script>let map;function initMaps(){map=new google.maps.Map(document.getElementById('map'),{center:{lat:23.6850,lng:90.3563},zoom:12,mapTypeId:'roadmap'});} function getLocation(){if(!navigator.geolocation){document.getElementById('locationDisplay').textContent='GPS not available';return;}navigator.geolocation.getCurrentPosition(p=>{const pos={lat:p.coords.latitude,lng:p.coords.longitude};map.setCenter(pos);map.setZoom(15);new google.maps.Marker({position:pos,map,title:'You are here'});document.getElementById('locationDisplay').textContent='Lat: '+pos.lat.toFixed(4)+', Lng: '+pos.lng.toFixed(4);},()=>{document.getElementById('locationDisplay').textContent='Location access denied';});}</script></body></html>
