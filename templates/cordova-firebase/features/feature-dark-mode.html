<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dark Mode Demo - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><style>:root{--bg:#ffffff;--text:#1a1a1a;--surface:#f5f5f5;--border:#e5e5e5}.dark-mode{--bg:#0D1117;--text:#E6EDF3;--surface:#161B22;--border:#30363D}body{background:var(--bg);color:var(--text);transition:all .3s}</style></head><body><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Dark Mode</h2><span></span></nav><div style="padding:24px;text-align:center"><h3>Theme Demo</h3><div style="display:flex;gap:12px;justify-content:center;margin:20px 0"><button class="action-btn" onclick="setTheme('light')">☀️ Light</button><button class="action-btn" onclick="setTheme('dark')">🌙 Dark</button><button class="action-btn" onclick="setTheme('system')">🔄 System</button></div><div class="demo-card" style="background:var(--surface);padding:20px;border-radius:12px;border:1px solid var(--border);margin:20px 0"><h4>Sample Card</h4><p>This card adapts to the current theme. Text and background change automatically.</p><div style="display:flex;gap:8px;margin-top:12px"><span style="background:var(--primary);color:#fff;padding:4px 12px;border-radius:4px">Tag 1</span><span style="background:var(--border);padding:4px 12px;border-radius:4px">Tag 2</span></div></div><p id="themeStatus">Current: <strong id="currentTheme">light</strong></p></div></div><script>
function initTheme(){const saved=localStorage.getItem('darkMode');if(saved==='true'||(saved===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.body.classList.add('dark-mode');document.getElementById('currentTheme').textContent='dark';}}
function setTheme(t){if(t==='light'){document.body.classList.remove('dark-mode');localStorage.setItem('darkMode','false');document.getElementById('currentTheme').textContent='☀️ Light';}else if(t==='dark'){document.body.classList.add('dark-mode');localStorage.setItem('darkMode','true');document.getElementById('currentTheme').textContent='🌙 Dark';}else{const m=window.matchMedia('(prefers-color-scheme:dark)').matches;document.body.classList.toggle('dark-mode',m);localStorage.removeItem('darkMode');document.getElementById('currentTheme').textContent='🔄 System ('+(m?'dark':'light')+')';}}
initTheme();
</script></body></html>
