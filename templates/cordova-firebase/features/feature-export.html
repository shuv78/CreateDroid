<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Export - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><script src="../shared/utils.js"></script><script src="../shared/db-firebase.js"></script></head><body onload="initExport()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Export Data</h2><span></span></nav><div style="padding:16px"><div class="form-group"><label>Export Type</label><select id="exportType"><option value="csv">CSV (Excel)</option><option value="json">JSON (Raw Data)</option></select></div><div class="form-group"><label>Collection</label><select id="exportCollection"><option value="items">Items</option><option value="users">Users</option><option value="orders">Orders</option></select></div><button class="primary-btn" onclick="doExport()">📥 Export</button><div id="exportResult" style="margin-top:16px;display:none"></div></div></div><script>
async function doExport(){const type=document.getElementById('exportType').value;const collection=document.getElementById('exportCollection').value;const btn=document.querySelector('.primary-btn');btn.textContent='⏳ Loading...';btn.disabled=true;try{const data=await getAll(collection);if(!data||data.length===0){showResult('⚠️ No data to export');return;}let content,filename,mime;if(type==='csv'){const headers=Object.keys(data[0]);const rows=data.map(r=>headers.map(h=>'"'+String(r[h]||'').replace(/"/g,'""')+'"').join(','));content=[headers.join(','),...rows].join('\n');filename=collection+'_'+formatDate()+'.csv';mime='text/csv';}else{content=JSON.stringify(data,null,2);filename=collection+'_'+formatDate()+'.json';mime='application/json';}const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showResult('✅ Exported '+data.length+' records as '+filename);}catch(e){showResult('❌ Error: '+e.message);}finally{btn.textContent='📥 Export';btn.disabled=false;}}
function showResult(html){const r=document.getElementById('exportResult');r.innerHTML=html;r.style.display='block';}
function formatDate(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
</script></body></html>
