<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Camera - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"></head><body><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Camera</h2><span></span></nav><div style="padding:16px;text-align:center"><div class="camera-controls"><button class="action-btn" onclick="takePhoto()">📸 Take Photo</button><button class="action-btn" onclick="pickFromGallery()">🖼 Pick from Gallery</button></div><div id="photoPreview" style="margin:16px 0;min-height:200px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)">Photo will appear here</div><div class="camera-info"><p id="photoInfo">No photo taken</p></div></div></div><script>function takePhoto(){if(typeof navigator.camera!=='undefined'){navigator.camera.getPicture(photoSuccess,photoFail,{quality:50, destinationType:Camera.DestinationType.DATA_URL,sourceType:Camera.PictureSourceType.CAMERA});}else{alert('Camera plugin not available. Use file picker.');}} function pickFromGallery(){if(typeof navigator.camera!=='undefined'){navigator.camera.getPicture(photoSuccess,photoFail,{quality:50, destinationType:Camera.DestinationType.DATA_URL,sourceType:Camera.PictureSourceType.PHOTOLIBRARY});}else{document.getElementById('fileInput')||createFileInput();}} function photoSuccess(imgData){document.getElementById('photoPreview').innerHTML='<img src="data:image/jpeg;base64,'+imgData+'" style="max-width:100%;max-height:300px;border-radius:8px">';document.getElementById('photoInfo').textContent='✅ Photo captured ('+(imgData.length*0.75/1024).toFixed(1)+'KB)';} function photoFail(msg){document.getElementById('photoInfo').textContent='❌ Camera error: '+msg;} function createFileInput(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){document.getElementById('photoPreview').innerHTML='<img src="'+ev.target.result+'" style="max-width:100%;max-height:300px;border-radius:8px">';document.getElementById('photoInfo').textContent='✅ '+file.name+' ('+(file.size/1024).toFixed(1)+'KB)';};reader.readAsDataURL(file);};inp.click();}</script></body></html>
