<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Profile - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/auth.js"></script></head><body onload="initProfile()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Profile</h2><span></span></nav><div class="profile-header"><div class="avatar-large" id="avatarDisplay">👤</div><h2 id="profileName">User</h2><p id="profileRole">User</p></div><div class="profile-details"><div class="detail-row"><span class="label">User ID</span><span id="profileId">-</span></div><div class="detail-row"><span class="label">Phone</span><span id="profilePhone">-</span></div><div class="detail-row"><span class="label">Area</span><span id="profileArea">-</span></div></div><div class="profile-actions"><button class="action-btn" onclick="editProfile()">✏️ Edit Profile</button><button class="action-btn" onclick="navigate('settings')">⚙️ Settings</button><button class="danger-btn" onclick="logout()">🚪 Logout</button></div></div><script>
function initProfile() { const u=JSON.parse(localStorage.getItem('currentUser')||'{}'); document.getElementById('profileName').textContent=u.name||'User'; document.getElementById('profileRole').textContent=u.role||'User'; document.getElementById('profileId').textContent=u.id||'-'; document.getElementById('profilePhone').textContent=u.phone||'-'; document.getElementById('profileArea').textContent=u.area||'-'; }
function editProfile(){alert('Edit profile coming soon');}
function navigate(p){window.location.href='screen-'+p+'.html';}
function logout(){localStorage.removeItem('currentUser');window.location.href='index.html';}
</script></body></html>
