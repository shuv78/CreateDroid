<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Welcome - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><style>.onboarding-slide{display:none;text-align:center;padding:40px 20px}.onboarding-slide.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh}.onboarding-slide img{width:120px;height:120px;margin-bottom:20px;border-radius:24px}.dots{display:flex;justify-content:center;gap:8px;margin:20px 0}.dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer}.dot.active{background:var(--primary)}</style></head><body onload="initOnboarding()"><div id="app"><div class="onboarding-slide active" id="slide0"><img src="assets/icons/icon-192.png" alt="Logo"><h1>Welcome to MyApp</h1><p>Your complete solution for managing your business efficiently</p></div><div class="onboarding-slide" id="slide1"><div style="font-size:80px">📊</div><h2>Track Everything</h2><p>Manage products, orders, and customers all in one place</p></div><div class="onboarding-slide" id="slide2"><div style="font-size:80px">🚀</div><h2>Get Started</h2><p>Ready to begin? Create your account and start managing!</p></div><div class="dots" id="dots"></div><button class="primary-btn" id="onboardingBtn" onclick="nextSlide()">Next →</button><button class="text-btn" onclick="skipOnboarding()" id="skipBtn">Skip</button></div><script>
let currentSlide=0;const totalSlides=3;
function initOnboarding(){renderDots();document.getElementById('onboardingBtn').textContent='Next →';}
function renderDots(){const c=document.getElementById('dots');c.innerHTML='';for(let i=0;i<totalSlides;i++){const d=document.createElement('span');d.className='dot'+(i===0?' active':'');d.onclick=()=>goToSlide(i);c.appendChild(d);}}
function goToSlide(n){document.querySelectorAll('.onboarding-slide').forEach((s,i)=>s.classList.toggle('active',i===n));document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===n));currentSlide=n;const btn=document.getElementById('onboardingBtn');if(n===totalSlides-1){btn.textContent='🚀 Get Started';document.getElementById('skipBtn').style.display='none';}else{btn.textContent='Next →';document.getElementById('skipBtn').style.display='block';}}
function nextSlide(){if(currentSlide<totalSlides-1){goToSlide(currentSlide+1);}else{skipOnboarding();}}
function skipOnboarding(){localStorage.setItem('onboardingDone','true');window.location.href='screen-login.html';}
</script></body></html>
