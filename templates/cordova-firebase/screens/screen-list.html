<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>List - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/db-firebase.js"></script></head><body onload="initList()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>List</h2><span></span></nav><div class="search-bar"><input type="text" id="searchInput" placeholder="Search..." oninput="filterList()"></div><div class="list-controls"><button onclick="sortList('name')">Name ↑↓</button><button onclick="sortList('createdAt')">Date ↑↓</button></div><div id="listContainer" class="list-view"></div><div class="pagination"><button onclick="prevPage()" id="prevBtn">← Prev</button><span id="pageInfo">Page 1</span><button onclick="nextPage()" id="nextBtn">Next →</button></div></div><nav class="bottom-nav"><button onclick="navigate('dashboard')">🏠</button><button onclick="navigate('list')" class="active">📋</button><button onclick="navigate('form')">✏️</button><button onclick="navigate('profile')">👤</button></nav><script>
let allItems=[], filteredItems=[], currentPage=1, pageSize=20, sortField='name', sortAsc=true;
function initList() { loadList(); }
async function loadList() { try { allItems=await getAll('items'); filteredItems=[...allItems]; renderList(); } catch(e){showError('Failed to load');} }
function renderList() { const start=(currentPage-1)*pageSize; const end=start+pageSize; const page=filteredItems.slice(start,end); const c=document.getElementById('listContainer'); if(page.length===0){c.innerHTML='<p class="empty-state">No items found. <a href="screen-form.html">Add one?</a></p>';return;} c.innerHTML=page.map(i=>'<div class="list-item" onclick="navigate(\'detail\',\''+esc(i.id)+'\')"><div class="item-main"><strong>'+esc(i.name||'Item')+'</strong></div><div class="item-meta"><small>'+fmtDate(i.createdAt)+'</small></div></div>').join(''); updatePagination(); }
function filterList() { const q=document.getElementById('searchInput').value.toLowerCase(); filteredItems=allItems.filter(i=>(i.name||'').toLowerCase().includes(q)); currentPage=1; renderList(); }
function sortList(field) { if(sortField===field)sortAsc=!sortAsc; else{sortField=field;sortAsc=true;} filteredItems.sort((a,b)=>{const va=(a[field]||'').toString().toLowerCase(),vb=(b[field]||'').toString().toLowerCase();return sortAsc?va.localeCompare(vb):vb.localeCompare(va);}); renderList(); }
function prevPage(){if(currentPage>1){currentPage--;renderList();}}
function nextPage(){if(currentPage*pageSize<filteredItems.length){currentPage++;renderList();}}
function updatePagination(){document.getElementById('pageInfo').textContent='Page '+currentPage+'/'+Math.max(1,Math.ceil(filteredItems.length/pageSize));document.getElementById('prevBtn').disabled=currentPage===1;document.getElementById('nextBtn').disabled=currentPage*pageSize>=filteredItems.length;}
function navigate(page,id){const params=id?'?id='+id:'';window.location.href='screen-'+page+'.html'+params;}
</script></body></html>
