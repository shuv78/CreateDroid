<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dashboard - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/auth.js"></script><script src="shared/db-firebase.js"></script></head><body onload="initDashboard()"><div id="app"><nav class="top-nav"><button onclick="showMenu()">☰</button><h2>Dashboard</h2><span id="userDisplay"></span></nav><div class="dashboard-stats" id="statsGrid"><div class="stat-card" onclick="navigate('list')"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Items</div></div><div class="stat-card" onclick="navigate('form')"><div class="stat-value">+</div><div class="stat-label">Add New</div></div></div><div class="recent-activity"><h3>Recent Activity</h3><div id="recentList"><p class="empty-state">Loading...</p></div></div><div class="quick-actions"><button class="action-btn" onclick="navigate('list')">📋 View All</button><button class="action-btn" onclick="navigate('form')">✏️ Add New</button><button class="action-btn" onclick="navigate('profile')">👤 Profile</button><button class="action-btn" onclick="navigate('settings')">⚙️ Settings</button></div></div><nav class="bottom-nav"><button onclick="navigate('dashboard')" class="active">🏠</button><button onclick="navigate('list')">📋</button><button onclick="navigate('form')">✏️</button><button onclick="navigate('profile')">👤</button></nav><script>
function initDashboard() { const u=JSON.parse(localStorage.getItem('currentUser')||'{}'); document.getElementById('userDisplay').textContent=u.name||'User'; loadStats(); loadRecent(); }
async function loadStats() { try { const data=await getAll('items'); document.getElementById('statTotal').textContent=data.length||0; } catch(e){console.log('Stats load err:',e);} }
async function loadRecent() { try { const data=await getAll('items'); const recent=document.getElementById('recentList'); if(!data||data.length===0){recent.innerHTML='<p class="empty-state">No items yet</p>';return;} recent.innerHTML=data.slice(-5).reverse().map(i=>'<div class="recent-item" onclick="navigate(\'detail\',\''+esc(i.id)+'\')"><strong>'+esc(i.name||'Item')+'</strong><small>'+fmtDate(i.createdAt)+'</small></div>').join(''); } catch(e){console.log('Recent load err:',e);} }
function navigate(page,id) { const params=id?'?id='+id:''; window.location.href='screen-'+page+'.html'+params; }
function showMenu() { document.querySelector('.sidebar')?.classList.toggle('show'); }
</script></body></html>
