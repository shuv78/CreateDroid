<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Chat - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><script src="../shared/db-firebase.js"></script></head><body><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Chat</h2><span id="chatStatus">💬</span></nav><div id="messagesContainer" class="chat-messages" style="padding:12px;overflow-y:auto;height:calc(100vh - 140px);display:flex;flex-direction:column;gap:8px"><p class="empty-state">Start a conversation</p></div><div class="chat-input" style="display:flex;gap:8px;padding:8px;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border)"><input type="text" id="chatInput" placeholder="Type a message..." style="flex:1;padding:10px;border:1px solid var(--border);border-radius:20px" onkeypress="if(event.key==='Enter')sendMessage()"><button class="primary-btn" onclick="sendMessage()" style="border-radius:50%;width:44px;height:44px;padding:0">➤</button></div></div><script>
let chatUnsub=null,currentChatId=null;
function startChat(chatId,participant){currentChatId=chatId;document.getElementById('chatStatus').textContent='💬 '+participant;loadMessages(chatId);}
function loadMessages(chatId){const c=document.getElementById('messagesContainer');if(chatUnsub)chatUnsub();chatUnsub=onSnapshot('messages',chatId,{senderId:'',text:'',timestamp:''},function(data){c.innerHTML=data.length?data.map(m=>{const isMe=m.senderId===(JSON.parse(localStorage.getItem('currentUser')||'{}').id);return'<div class="msg '+(isMe?'msg-out':'msg-in')+'" style="align-self:'+(isMe?'flex-end':'flex-start')+';max-width:80%;padding:8px 12px;border-radius:12px;background:'+(isMe?'var(--primary)':'var(--surface)')+'"><p style="margin:0">'+esc(m.text)+'</p><small style="opacity:0.7">'+fmtTime(m.timestamp)+'</small></div>';}).join(''):'<p class="empty-state">No messages yet</p>';c.scrollTop=c.scrollHeight;},function(err){console.log('Chat load error:',err);});}
function sendMessage(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!currentChatId)return;input.value='';const u=JSON.parse(localStorage.getItem('currentUser')||'{}');addDoc('messages',{chatId:currentChatId,senderId:u.id,senderName:u.name,text:text,timestamp:new Date().toISOString()}).catch(e=>console.log('Send error:',e));}
</script></body></html>
