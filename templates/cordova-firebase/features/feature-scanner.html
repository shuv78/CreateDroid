<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Scanner - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><script src="https://unpkg.com/html5-qrcode"></script></head><body><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Scanner</h2><span></span></nav><div style="padding:16px;text-align:center"><button class="primary-btn" onclick="startScan()" id="scanBtn">📱 Start Scanner</button><div id="reader" style="width:100%;max-width:400px;margin:16px auto"></div><div id="scanResult" style="margin-top:12px;padding:12px;border-radius:8px;background:var(--surface);display:none"></div></div></div><script>let html5QrCode;function startScan(){document.getElementById('scanBtn').textContent='⏳ Scanning...';document.getElementById('scanBtn').disabled=true;document.getElementById('scanResult').style.display='none';if(typeof Html5Qrcode==='undefined'){document.getElementById('scanResult').innerHTML='❌ html5-qrcode library not loaded';document.getElementById('scanResult').style.display='block';document.getElementById('scanBtn').textContent='📱 Start Scanner';document.getElementById('scanBtn').disabled=false;return;}html5QrCode=new Html5Qrcode('reader');html5QrCode.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},function(decodedText){showResult('✅ Scanned: <strong>'+esc(decodedText)+'</strong>');html5QrCode.stop();document.getElementById('scanBtn').textContent='📱 Scan Again';document.getElementById('scanBtn').disabled=false;},function(err){console.log('Scan error:',err);}).catch(function(err){showResult('❌ Camera error: '+err.message);document.getElementById('scanBtn').textContent='📱 Start Scanner';document.getElementById('scanBtn').disabled=false;});} function showResult(html){const r=document.getElementById('scanResult');r.innerHTML=html;r.style.display='block';} function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}</script></body></html>
