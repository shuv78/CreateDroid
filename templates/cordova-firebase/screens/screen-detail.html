<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Detail - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script><script src="shared/db-firebase.js"></script></head><body onload="initDetail()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Details</h2><span></span></nav><div id="detailContainer" class="detail-view"><div class="loading">Loading...</div></div><div class="detail-actions" id="detailActions"><button class="primary-btn" onclick="editItem()">✏️ Edit</button><button class="danger-btn" onclick="deleteItem()">🗑 Delete</button></div></div><script>
let currentItem=null;
function initDetail() { const params=new URLSearchParams(window.location.search); const id=params.get('id'); if(id) loadItem(id); else showError('No item ID'); }
async function loadItem(id) { try { const item=await getById('items',id); if(!item){showError('Item not found');return;} currentItem=item; renderDetail(item); } catch(e){showError('Failed to load');} }
function renderDetail(item) { const c=document.getElementById('detailContainer'); c.innerHTML='<div class="detail-card">'+(item.imageUrl?'<img src="'+esc(item.imageUrl)+'" class="detail-image">':'')+'<h2>'+esc(item.name||'Item')+'</h2><div class="detail-meta"><div class="detail-row"><span class="label">ID</span><span>'+esc(item.id)+'</span></div><div class="detail-row"><span class="label">Status</span><span class="badge badge-'+esc(item.status||'active')+'">'+esc(item.status||'active')+'</span></div><div class="detail-row"><span class="label">Description</span><span>'+esc(item.description||'-')+'</span></div><div class="detail-row"><span class="label">Created</span><span>'+fmtDate(item.createdAt)+'</span></div><div class="detail-row"><span class="label">Updated</span><span>'+fmtDate(item.updatedAt)+'</span></div></div></div>'; }
function editItem() { if(currentItem) window.location.href='screen-form.html?id='+currentItem.id; }
async function deleteItem() { if(!confirm('Delete this item?')) return; try { await removeDoc('items',currentItem.id); alert('Deleted!'); window.location.href='screen-list.html'; } catch(e){showError('Delete failed');} }
function showError(m){document.getElementById('detailContainer').innerHTML='<div class="error-msg">'+m+'</div>';}
</script></body></html>
