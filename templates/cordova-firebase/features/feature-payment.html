<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Payment - MyApp</title><link rel="stylesheet" href="../css/theme-line.css"><script src="../shared/utils.js"></script></head><body onload="initPayment()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Payment</h2><span></span></nav><div class="payment-form" style="padding:16px"><div class="form-group"><label>Amount (৳)</label><input type="number" id="payAmount" min="1" step="0.01" required></div><div class="form-group"><label>Payment Method</label><select id="payMethod"><option value="bKash">bKash</option><option value="Nagad">Nagad</option><option value="Rocket">Rocket</option><option value="Cash">Cash</option><option value="Stripe">Card (Stripe)</option></select></div><div id="bkashInfo" class="payment-info"><p>Send to: <strong>01XXXXXXXXX</strong> (bKash Merchant)</p></div><div class="form-group"><label>Transaction ID</label><input type="text" id="txnId" placeholder="Enter transaction ID after payment"></div><button class="primary-btn" onclick="processPayment()">💳 Pay Now</button><div id="paymentResult" style="margin-top:12px;display:none"></div></div></div><script>function initPayment(){document.getElementById('payMethod').onchange=function(){document.getElementById('bkashInfo').querySelector('strong').textContent=this.value==='bKash'?'01XXXXXXXXX (bKash)':this.value==='Nagad'?'01XXXXXXXXX (Nagad)':'01XXXXXXXXX (Rocket)';};} async function processPayment(){const amt=document.getElementById('payAmount').value;if(!amt||amt<=0){alert('Enter valid amount');return;}const method=document.getElementById('payMethod').value;const txn=document.getElementById('txnId').value;const result=document.getElementById('paymentResult');result.style.display='block';result.innerHTML='⏳ Processing...';setTimeout(()=>{result.innerHTML='✅ Payment of ৳'+amt+' via '+method+' recorded. Txn: '+(txn||'N/A');result.style.color='green';},1500);}</script></body></html>
