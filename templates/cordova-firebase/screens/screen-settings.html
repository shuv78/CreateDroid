<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Settings - MyApp</title><link rel="stylesheet" href="css/theme-line.css"><script src="shared/version.js"></script><script src="shared/utils.js"></script></head><body onload="initSettings()"><div id="app"><nav class="top-nav"><button onclick="window.history.back()">←</button><h2>Settings</h2><span></span></nav><div class="settings-group"><h3>Appearance</h3><div class="setting-row"><span>Dark Mode</span><label class="switch"><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"><span class="slider"></span></label></div><div class="setting-row"><span>Language</span><select id="langSelect" onchange="changeLang(this.value)"><option value="bn">বাংলা</option><option value="en">English</option></select></div></div><div class="settings-group"><h3>Info</h3><div class="setting-row"><span>Version</span><span id="versionDisplay">v0.0.0</span></div><div class="setting-row"><span>App Name</span><span>MyApp</span></div></div><div class="settings-group"><h3>Actions</h3><button class="action-btn" onclick="navigate('about')">ℹ️ About</button><button class="action-btn" onclick="navigate('privacy')">🔒 Privacy</button><button class="action-btn" onclick="navigate('terms')">📄 Terms</button><button class="action-btn" onclick="navigate('contact')">📧 Contact</button><button class="action-btn" onclick="navigate('rate-share')">⭐ Rate & Share</button></div></div><script>
function initSettings() { document.getElementById('versionDisplay').textContent='v'+APP_VERSION; const dm=localStorage.getItem('darkMode'); document.getElementById('darkModeToggle').checked=dm==='true'; const lang=localStorage.getItem('lang')||'bn'; document.getElementById('langSelect').value=lang; }
function toggleDarkMode() { const on=document.getElementById('darkModeToggle').checked; localStorage.setItem('darkMode',on); document.body.classList.toggle('dark-mode',on); }
function changeLang(l){localStorage.setItem('lang',l);alert('Language changed. Reload to see changes.');}
function navigate(p){window.location.href='screen-'+p+'.html';}
</script></body></html>
